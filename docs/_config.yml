theme: jekyll-theme-cayman
title: Horizon Daily
description: AI-curated daily digest of tech and research news
baseurl: "" # empty for Cloudflare Pages (site at root)
url: "https://horizon-2026-04-06.pages.dev"

# Build settings
markdown: kramdown
future: true # Allow future posts to be published
plugins:
  - jekyll-feed
feed:
  path: feed.xml
exclude:
  - ".github"
  - "node_modules"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
